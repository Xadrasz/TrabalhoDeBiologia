<body>

<div class="stars" id="stars"></div>

<header>🌿 Cloroplastos</header>

<div class="container">

  <button onclick="escrever('O Cloroplasto é uma organela celular presente majoritariamente em células vegetais, com a mesma importância da mitocôndria - porém para as células procarióticas vegetais.')">Visão Geral</button>
  <button onclick="escrever('É responsável pela produção de energia na célula vegetal por meio da fotossíntese: processo que transforma energia luminosa em energia química(glicose).')">Função</button>
  <button onclick="escrever('A teoria de origem do Cloroplasto é a mesma da mitôcondria, já que as duas organelas têm diversas semelhanças: produção de ATP(adenosina trifosfato), DNA próprio, dupla membrana. A teoria diz: Há muito tempo, o Cloroplasto já foi uma célula única, mas atualmente vive em simbiose em uma célula maior a partir de uma tentativa falha da célula de fagocitar e degradar o Cloroplasto.')">Curiosidades</button>
    <br>

         onclick="escrever('tilacoide')"></div>

         onclick="escrever('estroma')"></div>

         onclick="escrever('membrana')"></div>
