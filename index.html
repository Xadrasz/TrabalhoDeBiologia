  <title>Cloroplastos</title>
</head>

<body>

<div class="stars" id="stars"></div>

<header>🌿 CLOROPLASTOS</header>

<div class="container">

  <button onclick="escrever('O Cloroplasto é uma organela celular presente majoritariamente em células vegetais, com a mesma importância da mitocôndria - porém para as células procarióticas vegetais.')">Visão Geral</button>
  <button onclick="escrever('É responsável pela produção de energia na célula vegetal por meio da fotossíntese: processo que transforma energia luminosa em energia química(glicose).')">Função</button>
  <button onclick="escrever('A teoria de origem do Cloroplasto é a mesma da mitôcondria, já que as duas organelas têm diversas semelhanças: produção de ATP(adenosina trifosfato), DNA próprio, dupla membrana. A teoria diz: Há muito tempo, o Cloroplasto já foi uma célula única, mas atualmente vive em simbiose em células maiores a partir de uma tentativa falha das células maiores de fagocitar e degradar o Cloroplasto.')">Curiosidades</button>
    <br>
  <div class="diagram">
    <img src="./Cloroplasto.png">

    <div class="part" style="top:40%; left:30%; width:40px; height:40px;"
     data-texto="Os Tilacóides são os principais responsáveis pela fotossíntese. Em conjunto, lembram várias moedas empilhadas, por isso são chamados de Grana (ou Granum). No tilacóide há a clorofila (pigmento protagonista da fotossíntese, que deixa as plantas verdes) e outros pigmentos fotossintéticos. A fotossíntese ocorre na membrana dos tilacóides, onde a luz é absorvida."></div>
    
    <div class="part" style="top:70%; left:60%; width:40px; height:40px;"
     data-texto="O Estroma é o fluido denso que preenche o interior de cloroplasto. Nele ocorrem várias reações químicas, incluindo a fase escura da fotossíntese. O estroma contém enzimas, DNA cloroplastidial (evidência da teoria endossimbiótica [veja Curiosidades]), ribossomos e outras moléculas necessárias para a síntese de açúcares."></div>
    
    <div class="part" style="top:5%; left:50%; width:40px; height:40px;"
     data-texto="O Cloroplasto é envolto por uma Dupla Membrana lipoproteica, que controla a entrada e saída de partículas. A membrana externa é lisa, enquanto a interna é dobrada, formando estruturas internas complexas."></div>
  </div>
  <svg id="svg-linha"></svg>
</div>
  <div id="info">Clique em algo para explorar...</div>
